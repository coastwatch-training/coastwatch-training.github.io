<div id="pdf-modal" class="pdf-modal" aria-hidden="true">
  <div class="pdf-modal-backdrop"></div>
  <div class="pdf-modal-content">
    <button id="pdf-modal-close" class="pdf-modal-close">×</button>
    <iframe id="pdf-frame" class="pdf-frame"></iframe>
  </div>
</div>

<script>
function buildPdfViewerUrl(pdfPath){
  return pdfPath + "#toolbar=0&navpanes=0&scrollbar=1&view=FitH";
}

document.addEventListener("click", function(e){
  const btn = e.target.closest("[data-pdf]");
  if(!btn) return;

  e.preventDefault();

  const modal = document.getElementById("pdf-modal");
  const frame = document.getElementById("pdf-frame");

  const pdf = btn.getAttribute("data-pdf");
  if(!pdf) return;

  frame.src = buildPdfViewerUrl(pdf);
  modal.classList.add("show");
  document.body.style.overflow = "hidden";
});

document.addEventListener("click", function(e){
  if(e.target.matches("#pdf-modal-close, .pdf-modal-backdrop")){
    const modal = document.getElementById("pdf-modal");
    const frame = document.getElementById("pdf-frame");

    frame.src = "";
    modal.classList.remove("show");
    document.body.style.overflow = "";
  }
});

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    const modal = document.getElementById("pdf-modal");
    const frame = document.getElementById("pdf-frame");

    if(modal.classList.contains("show")){
      frame.src = "";
      modal.classList.remove("show");
      document.body.style.overflow = "";
    }
  }
});
</script>
