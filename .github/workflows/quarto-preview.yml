name: Quarto Branch Preview

on:
  push:
    branches-ignore:
      - main
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "preview-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build-and-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render site
        run: quarto render

      - name: Make safe branch name
        id: vars
        run: |
          SAFE_BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's#[^A-Za-z0-9._-]#-#g')
          echo "safe_branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Prepare preview files
        run: |
          mkdir -p public/preview/${{ steps.vars.outputs.safe_branch }}
          cp -r docs/* public/preview/${{ steps.vars.outputs.safe_branch }}/
          touch public/.nojekyll

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
          keep_files: true
